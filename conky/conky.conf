conky.config = {
    -- Wayland / Sway (Fedora)
    out_to_wayland = true,
    out_to_x = false,

    -- Performance
    double_buffer = true,
    no_buffers = true,
    text_buffer_size = 2048,

    -- Position
    alignment = 'middle_left',
    gap_x = 50,
    gap_y = 300,

    -- Size
    minimum_width = 1,
    minimum_height = 1,
    maximum_width = 1000,

    -- Window
    own_window = true,
    own_window_type = 'desktop',        -- 'normal' is X11-specific; 'desktop' works on Wayland
    own_window_transparent = true,
    own_window_argb_visual = true,
    own_window_argb_value = 0,          -- fully transparent background
    own_window_colour = '000000',
    own_window_hints = 'undecorated,below,sticky,skip_taskbar,skip_pager',

    -- Borders / drawing
    border_inner_margin = 0,
    border_outer_margin = 0,
    draw_shades = false,
    draw_outline = false,
    draw_borders = false,
    draw_graph_borders = false,
    default_shade_color = '112422',

    -- Text / font
    use_xft = true,
    font = 'Feena Casual:size=10',
    xftalpha = 1,
    override_utf8_locale = true,
    uppercase = true,
    default_color = 'D6D5D4',

    -- Update
    update_interval = 1,
    background = false,
}

conky.text = [[
${font Adamas:size=60}${color D6D5D4}${time %A}
${font Chilanka-Regular:size=15}${color D6D5D4}${voffset 0}${offset 100}${time %m %B}
${font Chilanka-Regular:size=15}${color D6D5D4}${voffset 0}${offset 150}${time %R}
]]
